<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" width="160" height="180" shape-rendering="crispEdges">
  
  <!-- 1. 頭髮主體 (深焦糖色) - 塑造圓潤的頭頂與兩側長髮 -->
  <g fill="#C06C38">
    <rect x="60" y="10" width="40" height="10" />
    <rect x="50" y="20" width="60" height="10" />
    <rect x="40" y="30" width="80" height="20" /> <!-- 這裡包含劉海區域 -->
    <rect x="30" y="40" width="10" height="60" /> <!-- 左側垂下的頭髮 -->
    <rect x="120" y="40" width="10" height="60" /> <!-- 右側垂下的頭髮 -->
  </g>

  <!-- 2. 明亮膚色 (臉、脖子、手、腿) - 勾勒出明確的四肢 -->
  <g fill="#FFE4C4">
    <!-- 臉部底色 -->
    <rect x="40" y="50" width="80" height="40" />
    <!-- 脖子 (較窄，凸顯頭部) -->
    <rect x="70" y="90" width="20" height="10" />
    <!-- 雙手 (與身體分離，產生人形輪廓) -->
    <rect x="30" y="100" width="10" height="20" />
    <rect x="120" y="100" width="10" height="20" />
    <!-- 雙腿 -->
    <rect x="60" y="140" width="10" height="20" />
    <rect x="90" y="140" width="10" height="20" />
  </g>

  <!-- 3. 眼睛 (深巧克力色) - Q版靈魂 -->
  <g fill="#5C3A21">
    <!-- 眼睛拉長至 2 個像素高 (20px)，看起來更可愛 -->
    <rect x="50" y="60" width="10" height="20" />
    <rect x="100" y="60" width="10" height="20" />
  </g>

  <!-- 4. 腮紅 (粉色) - 增加生動感 -->
  <g fill="#FFB6C1">
    <rect x="40" y="70" width="10" height="10" />
    <rect x="110" y="70" width="10" height="10" />
  </g>

  <!-- 5. 洋裝主體 (奶油色) -->
  <g fill="#FFF8DC">
    <rect x="50" y="100" width="60" height="10" /> <!-- 胸口 -->
    <rect x="40" y="110" width="80" height="30" /> <!-- 展開的裙襬 -->
  </g>

  <!-- 6. 洋裝腰帶點綴 (暖沙色) -->
  <g fill="#F4A460">
    <rect x="50" y="120" width="60" height="10" /> <!-- 做出腰身比例 -->
  </g>

  <!-- 7. 鞋子 (深棕色) -->
  <g fill="#8B4513">
    <rect x="50" y="160" width="20" height="10" />
    <rect x="90" y="160" width="20" height="10" />
  </g>

</svg>
