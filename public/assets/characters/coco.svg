<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="320" height="400" shape-rendering="crispEdges">
  <!-- 背景：極淺的薄荷灰，突顯黑皮與紅黑色調 -->
  <rect width="16" height="20" fill="transparent"/>

  <!-- 俐落短髮 (經典可樂黑) -->
  <g fill="#1A1A1A">
    <rect x="5" y="2" width="6" height="1"/>
    <rect x="4" y="3" width="8" height="1"/>
    <rect x="3" y="4" width="10" height="2"/>
    <rect x="3" y="6" width="2" height="3"/> <!-- 兩側短髮鬢角 -->
    <rect x="11" y="6" width="2" height="3"/>
  </g>

  <!-- 運動髮帶 (經典紅) -->
  <g fill="#E62020">
    <rect x="4" y="4" width="8" height="1"/>
  </g>

  <!-- 黑皮/健康古銅色肌膚 -->
  <g fill="#A66A44">
    <rect x="5" y="5" width="6" height="4"/> <!-- 臉部 -->
    <rect x="7" y="9" width="2" height="1"/> <!-- 脖子 -->
    <rect x="4" y="11" width="2" height="3"/> <!-- 左手臂 -->
    <rect x="10" y="11" width="2" height="3"/> <!-- 右手臂 -->
    <rect x="6" y="13" width="4" height="1"/> <!-- 露出的小蠻腰 -->
    <rect x="6" y="16" width="1" height="2"/> <!-- 左腿 -->
    <rect x="9" y="16" width="1" height="2"/> <!-- 右腿 -->
  </g>

  <!-- 充滿自信的眼睛 (黑色) -->
  <g fill="#000000">
    <rect x="6" y="7" width="1" height="1"/>
    <rect x="9" y="7" width="1" height="1"/>
  </g>

  <!-- 運動短版上衣 (經典紅) -->
  <g fill="#E62020">
    <rect x="5" y="10" width="6" height="3"/>
  </g>
  
  <!-- 衣服上的白色弧線點綴 (隱喻可樂標線) -->
  <g fill="#FFFFFF">
    <rect x="5" y="11" width="2" height="1"/>
    <rect x="7" y="12" width="2" height="1"/>
    <rect x="9" y="11" width="2" height="1"/>
  </g>

  <!-- 運動短褲 (經典黑) -->
  <g fill="#1A1A1A">
    <rect x="5" y="14" width="6" height="2"/>
  </g>
  
  <!-- 短褲側邊紅色線條 -->
  <g fill="#E62020">
    <rect x="4" y="14" width="1" height="2"/>
    <rect x="11" y="14" width="1" height="2"/>
  </g>

  <!-- 運動鞋 (白底紅邊) -->
  <g fill="#FFFFFF">
    <rect x="5" y="18" width="2" height="1"/>
    <rect x="9" y="18" width="2" height="1"/>
  </g>
  <g fill="#E62020">
    <rect x="5" y="19" width="2" height="1"/>
    <rect x="9" y="19" width="2" height="1"/>
  </g>
</svg>
