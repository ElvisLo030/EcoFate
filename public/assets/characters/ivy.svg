<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="320" height="400" shape-rendering="crispEdges">
  <!-- 畫布背景：柔和的冰雪藍，襯托冷色調 -->
  <rect width="16" height="20" fill="transparent"/>

  <!-- 後髮與鬢角 (深藍色，提取自瓶蓋) -->
  <g fill="#1A2B4C">
    <rect x="5" y="2" width="6" height="1"/>
    <rect x="4" y="3" width="8" height="1"/>
    <rect x="3" y="4" width="10" height="4"/>
    <rect x="3" y="8" width="2" height="7"/> <!-- 左鬢角 -->
    <rect x="11" y="8" width="2" height="7"/> <!-- 右鬢角 -->
  </g>

  <!-- 臉部與肢體皮膚 (白皙膚色) -->
  <g fill="#FDF1E7">
    <rect x="5" y="5" width="6" height="5"/> <!-- 臉部主體 -->
    <rect x="7" y="10" width="2" height="2"/> <!-- 脖頸拉長 -->
    <rect x="5" y="17" width="2" height="2"/> <!-- 左腿 -->
    <rect x="9" y="17" width="2" height="2"/> <!-- 右腿 -->
  </g>

  <!-- 高冷表情：半閉的眼睛與平淡的嘴巴 -->
  <g fill="#2C3E50">
    <!-- 眼神：縮小更加秀氣 -->
    <rect x="6" y="7" width="1" height="1"/>
    <rect x="9" y="7" width="1" height="1"/>
    <!-- 嘴巴：極小的一點，面無表情 -->
    <rect x="7" y="9" width="2" height="1"/>
  </g>

  <!-- 瀏海 (齊瀏海增加俐落的學霸感) -->
  <g fill="#1A2B4C">
    <rect x="4" y="4" width="8" height="1"/>
    <rect x="5" y="5" width="6" height="1"/>
  </g>

  <!-- 衣服：白色襯衫與冰藍色制服裙 (提取自透明瓶身) -->
  <g fill="#FFFFFF">
    <rect x="5" y="11" width="6" height="4"/> <!-- 襯衫主體收窄 -->
    <rect x="4" y="12" width="1" height="3"/> <!-- 左手袖子 -->
    <rect x="11" y="12" width="1" height="3"/> <!-- 右手袖子 -->
  </g>

  <g fill="#A8D0E6">
    <rect x="4" y="15" width="8" height="2"/> <!-- 裙子主體收窄 -->
  </g>

  <!-- 點綴：粉色山脈圖騰 (轉化為領結與裙襬裝飾) -->
  <g fill="#F67280">
    <!-- 制服領結 -->
    <rect x="7" y="11" width="2" height="2"/>
    <!-- 裙襬上的山峰幾何邊緣 -->
    <rect x="4" y="16" width="1" height="1"/>
    <rect x="6" y="16" width="1" height="1"/>
    <rect x="9" y="16" width="1" height="1"/>
    <rect x="11" y="16" width="1" height="1"/>
  </g>

  <!-- 深藍色皮鞋 -->
  <g fill="#1A2B4C">
    <rect x="4" y="19" width="3" height="1"/>
    <rect x="9" y="19" width="3" height="1"/>
  </g>
</svg>
