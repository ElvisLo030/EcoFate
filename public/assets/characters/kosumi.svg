<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="320" height="400" shape-rendering="crispEdges">
  <!-- 背景 -->
  <rect width="16" height="20" fill="transparent"/>

  <!-- 頭髮與鞋子 (深藍色，取自瓶蓋) -->
  <g fill="#2864C8">
    <rect x="6" y="2" width="4" height="1"/>
    <rect x="5" y="3" width="6" height="1"/>
    <rect x="4" y="4" width="8" height="1"/>
    <rect x="3" y="5" width="2" height="1"/> <rect x="11" y="5" width="2" height="1"/>
    <rect x="3" y="6" width="2" height="1"/> <rect x="11" y="6" width="2" height="1"/>
    <rect x="3" y="7" width="1" height="1"/> <rect x="12" y="7" width="1" height="1"/>
    <rect x="3" y="8" width="1" height="1"/> <rect x="12" y="8" width="1" height="1"/>
    <rect x="3" y="9" width="3" height="1"/> <rect x="10" y="9" width="3" height="1"/>
    <rect x="4" y="10" width="2" height="1"/> <rect x="10" y="10" width="2" height="1"/>
    <rect x="4" y="11" width="1" height="1"/> <rect x="11" y="11" width="1" height="1"/>
    <rect x="5" y="17" width="2" height="1"/> <rect x="9" y="17" width="2" height="1"/>
  </g>

  <!-- 皮膚 -->
  <g fill="#FFD2B4">
    <rect x="5" y="5" width="6" height="2"/>
    <rect x="4" y="7" width="2" height="1"/> <rect x="7" y="7" width="2" height="1"/> <rect x="10" y="7" width="2" height="1"/>
    <rect x="4" y="8" width="1" height="1"/> <rect x="6" y="8" width="4" height="1"/> <rect x="11" y="8" width="1" height="1"/>
    <rect x="7" y="9" width="2" height="1"/>
    <rect x="6" y="15" width="1" height="2"/>
    <rect x="9" y="15" width="1" height="2"/>
  </g>

  <!-- 眼睛 (黑色) -->
  <g fill="#000000">
    <rect x="6" y="7" width="1" height="1"/>
    <rect x="9" y="7" width="1" height="1"/>
  </g>

  <!-- 臉頰紅暈與衣服山峰圖騰 (粉紅色，取自山脈) -->
  <g fill="#F0788C">
    <rect x="5" y="8" width="1" height="1"/>
    <rect x="10" y="8" width="1" height="1"/>
    <rect x="7" y="10" width="2" height="1"/>
    <rect x="6" y="11" width="1" height="1"/> <rect x="9" y="11" width="1" height="1"/>
    <rect x="4" y="12" width="8" height="1"/>
  </g>

  <!-- 衣服基底 (白色) -->
  <g fill="#FFFFFF">
    <rect x="6" y="10" width="1" height="1"/> <rect x="9" y="10" width="1" height="1"/>
    <rect x="5" y="11" width="1" height="1"/> <rect x="7" y="11" width="2" height="1"/> <rect x="10" y="11" width="1" height="1"/>
    <rect x="4" y="13" width="8" height="1"/>
  </g>

  <!-- 裙襬與水波 (水藍色，取自瓶身) -->
  <g fill="#D2E6FA">
    <rect x="3" y="14" width="10" height="1"/>
    <rect x="3" y="15" width="2" height="1"/> <rect x="11" y="15" width="2" height="1"/>
  </g>
</svg>
