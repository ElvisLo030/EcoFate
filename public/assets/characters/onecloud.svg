<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" width="160" height="180" shape-rendering="crispEdges">
  
  <!-- 1. 正常人類膚色 (臉部) -->
  <g fill="#FFE4C4">
    <rect x="50" y="40" width="60" height="40" />
    <rect x="55" y="80" width="50" height="5" /> <!-- 下巴修飾 -->
  </g>

  <!-- 2. 數據傳輸纜線髮型 (科技深藍色) - 取代原本的雙馬尾 -->
  <g fill="#2563EB">
    <rect x="50" y="10" width="60" height="10" />
    <rect x="40" y="20" width="80" height="20" />
    <!-- 兩側下垂的不是頭髮，而是粗造的數據纜線 -->
    <rect x="30" y="40" width="15" height="50" />
    <rect x="115" y="40" width="15" height="50" />
  </g>

  <!-- 3. 機械耳機與纜線末端金屬 (銀灰色) -->
  <g fill="#94A3B8">
    <rect x="40" y="50" width="10" height="15" /> <!-- 左機械耳 -->
    <rect x="110" y="50" width="10" height="15" /> <!-- 右機械耳 -->
    <rect x="30" y="90" width="15" height="10" /> <!-- 纜線末端金屬接頭 -->
    <rect x="115" y="90" width="15" height="10" />
  </g>

  <!-- 4. HUD 戰術顯示面罩 (取代原本的眼睛，增加非人感) -->
  <g fill="#1E293B">
    <rect x="45" y="55" width="70" height="15" /> <!-- 面罩底座 -->
  </g>
  <g fill="#00FFFF">
    <rect x="50" y="60" width="60" height="5" /> <!-- 面罩發光掃描線 -->
  </g>

  <!-- 5. 機械頸部與軀幹裝甲 (深淺灰色金屬) -->
  <g fill="#64748B">
    <rect x="70" y="85" width="20" height="10" /> <!-- 金屬脖子 -->
    <!-- 身體基礎裝甲 -->
    <rect x="50" y="95" width="60" height="45" /> 
  </g>
  <!-- 頸部仿生關節縫隙 -->
  <rect x="70" y="90" width="20" height="2" fill="#0F172A" />

  <!-- 6. 雲端發票核心螢幕 (胸口的載具條碼區) -->
  <g fill="#FFFFFF">
    <rect x="55" y="105" width="50" height="25" /> <!-- 白色螢幕 -->
    <!-- 載具條碼 -->
    <rect x="60" y="110" width="4" height="15" fill="#1A1A1A" />
    <rect x="68" y="110" width="2" height="15" fill="#1A1A1A" />
    <rect x="74" y="110" width="6" height="15" fill="#1A1A1A" />
    <rect x="84" y="110" width="4" height="15" fill="#1A1A1A" />
    <rect x="92" y="110" width="3" height="15" fill="#1A1A1A" />
    <rect x="98" y="110" width="2" height="15" fill="#1A1A1A" />
  </g>

  <!-- 7. 機械義肢：雙手 (鈦黑色與銀色交錯) -->
  <g fill="#334155">
    <rect x="35" y="95" width="15" height="15" /> <!-- 肩膀關節 -->
    <rect x="110" y="95" width="15" height="15" />
  </g>
  <g fill="#94A3B8">
    <rect x="35" y="110" width="10" height="30" /> <!-- 機械手臂 -->
    <rect x="115" y="110" width="10" height="30" />
  </g>

  <!-- 8. 機械義肢：雙腿 (帶有霓虹發光關節) -->
  <g fill="#1E293B">
    <rect x="60" y="140" width="15" height="40" /> <!-- 左機械腿 -->
    <rect x="85" y="140" width="15" height="40" /> <!-- 右機械腿 -->
  </g>
  <g fill="#00FFFF">
    <!-- 腿部動力發光節點 -->
    <rect x="65" y="155" width="5" height="5" />
    <rect x="90" y="155" width="5" height="5" />
  </g>

</svg>
