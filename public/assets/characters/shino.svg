<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="320" height="400" shape-rendering="crispEdges">
  <!-- 蘋果牛奶金黃色頭髮 -->
  <g fill="#FAD689">
    <rect x="4" y="3" width="8" height="1"/>
    <rect x="3" y="4" width="10" height="4"/>
    <rect x="3" y="8" width="2" height="3"/> <!-- 左鬢角 -->
    <rect x="11" y="8" width="2" height="3"/> <!-- 右鬢角 -->
  </g>

  <!-- 蘋果紅髮飾 (規避商標，只取意象) -->
  <g fill="#D32F2F">
    <rect x="11" y="5" width="2" height="2"/>
  </g>
  <!-- 髮飾上的綠色葉子點綴 -->
  <g fill="#4CAF50">
    <rect x="12" y="4" width="1" height="1"/>
  </g>

  <!-- 白皙粉嫩膚色 -->
  <g fill="#FFF0E6">
    <rect x="5" y="5" width="6" height="5"/> <!-- 臉部 -->
    <rect x="7" y="10" width="2" height="1"/> <!-- 脖子 -->
    <rect x="4" y="13" width="1" height="2"/> <!-- 左手 -->
    <rect x="11" y="13" width="1" height="2"/> <!-- 右手 -->
    <rect x="5" y="16" width="2" height="3"/> <!-- 左腿 -->
    <rect x="9" y="16" width="2" height="3"/> <!-- 右腿 -->
  </g>

  <!-- 深藍色眼眸 (取自包裝字體與乳牛) -->
  <g fill="#1565C0">
    <rect x="6" y="8" width="1" height="1"/>
    <rect x="9" y="8" width="1" height="1"/>
  </g>

  <!-- 衣服：純淨牛奶白底色 -->
  <g fill="#FFFFFF">
    <rect x="4" y="11" width="8" height="5"/>
    <rect x="3" y="12" width="1" height="2"/>
    <rect x="12" y="12" width="1" height="2"/>
  </g>

  <!-- 衣服裝飾：蘋果紅裙襬與領結 -->
  <g fill="#D32F2F">
    <rect x="7" y="11" width="2" height="1"/> <!-- 領結 -->
    <rect x="4" y="15" width="8" height="1"/> <!-- 裙襬紅邊 -->
  </g>

  <!-- 鞋子：蘋果紅皮鞋 -->
  <g fill="#D32F2F">
    <rect x="4" y="19" width="3" height="1"/>
    <rect x="9" y="19" width="3" height="1"/>
  </g>
</svg>
