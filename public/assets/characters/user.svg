<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" width="160" height="180" shape-rendering="crispEdges">
  
  <!-- 1. 男主標配：微亂的深棕色短髮與呆毛 -->
  <g fill="#3E2723">
    <!-- 靈魂呆毛 (Ahoge)，主角絕對不能沒有這個！ -->
    <rect x="70" y="10" width="10" height="10" />
    <rect x="80" y="20" width="10" height="10" />
    
    <!-- 頭髮主體 -->
    <rect x="40" y="30" width="80" height="20" />
    <rect x="30" y="40" width="100" height="20" />
    <rect x="30" y="60" width="15" height="25" /> <!-- 兩側鬢角 -->
    <rect x="115" y="60" width="15" height="25" />
    <rect x="45" y="50" width="70" height="10" /> <!-- 些微蓋住額頭的瀏海 -->
  </g>

  <!-- 2. 健康的亞洲大學生標準膚色 -->
  <g fill="#FFE4C4">
    <rect x="45" y="60" width="70" height="35" /> <!-- 臉部 -->
    <rect x="65" y="95" width="30" height="10" /> <!-- 脖子 -->
    <!-- 左手 (自然下垂) -->
    <rect x="30" y="140" width="15" height="15" />
    <!-- 右手 (舉起拿手機) -->
    <rect x="110" y="95" width="15" height="10" />
  </g>

  <!-- 3. 眼神 (帶點熬夜打Game寫程式的疲憊，但依然溫柔可靠) -->
  <g fill="#27272A">
    <rect x="55" y="70" width="10" height="15" />
    <rect x="95" y="70" width="10" height="15" />
  </g>

  <!-- 4. 內搭白T恤 -->
  <g fill="#FFFFFF">
    <rect x="60" y="105" width="40" height="45" />
  </g>

  <!-- 5. ESG 綠色連帽休閒外套 (表現環保與校園休閒感) -->
  <g fill="#10B981">
    <rect x="40" y="105" width="20" height="45" /> <!-- 左側外套身 -->
    <rect x="100" y="105" width="20" height="45" /> <!-- 右側外套身 -->
    <!-- 左手臂 -->
    <rect x="25" y="105" width="20" height="35" />
    <!-- 右手臂 (彎曲舉起) -->
    <rect x="110" y="105" width="20" height="30" />
  </g>

  <!-- 6. 智慧型手機 (與一雲連線的終端設備) -->
  <g fill="#1F2937">
    <rect x="105" y="60" width="20" height="35" /> <!-- 手機外殼 -->
  </g>
  <!-- 手機螢幕 (正顯示著一雲專屬的青藍色數據光芒) -->
  <g fill="#0EA5E9">
    <rect x="110" y="65" width="10" height="25" /> 
  </g>

  <!-- 7. 牛仔褲 (百搭休閒) -->
  <g fill="#3B82F6">
    <rect x="45" y="150" width="70" height="30" />
  </g>

</svg>
