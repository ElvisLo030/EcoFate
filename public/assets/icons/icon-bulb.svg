  <rect x="5" y="1" width="6" height="1" fill="#C9900A"/>
  <!-- 燈泡主體 -->
  <rect x="4" y="2" width="8" height="5" fill="#C9900A"/>
  <rect x="3" y="3" width="10" height="3" fill="#C9900A"/>
