  <!-- 屋頂階梯 -->
  <rect x="6" y="2" width="4" height="1" fill="#555"/>
  <rect x="5" y="3" width="6" height="1" fill="#555"/>
  <rect x="4" y="4" width="8" height="1" fill="#555"/>
  <rect x="3" y="5" width="10" height="1" fill="#555"/>
  <rect x="2" y="6" width="12" height="1" fill="#555"/>
  <!-- 左牆 -->
  <rect x="2" y="7" width="4" height="8" fill="#555"/>
  <!-- 右牆 -->
  <rect x="10" y="7" width="4" height="8" fill="#555"/>
  <!-- 門楣（門洞頂部） -->
  <rect x="6" y="7" width="4" height="2" fill="#555"/>
</svg>
