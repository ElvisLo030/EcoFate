  <rect x="14" y="1" width="2" height="14" fill="#2d2d2d"/>
  <rect x="12" y="2" width="2" height="12" fill="#2d2d2d"/>
  <rect x="10" y="3" width="2" height="10" fill="#2d2d2d"/>
  <rect x="8" y="4" width="2" height="8" fill="#2d2d2d"/>
  <rect x="6" y="5" width="2" height="6" fill="#2d2d2d"/>
  <rect x="4" y="6" width="2" height="4" fill="#2d2d2d"/>
  <rect x="2" y="7" width="2" height="2" fill="#2d2d2d"/>
</svg>
